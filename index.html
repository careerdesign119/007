<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE LEADERBOARD</title>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz1QFRZlMxe4eIvPJMcc_DlvkpJtB8R8snxlKueGPCNoQuDoE-mS_QMjZKI8895SgUF/exec";
const POLL_MS = 2000;
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:            #06080f;
  --surface:       rgba(255,255,255,0.033);
  --border:        rgba(255,255,255,0.07);
  --cyan:          #00d4ff;
  --gold:          #f5c842;
  --silver:        #a8b4c8;
  --bronze:        #c87d3e;
  --up:            #00ffb3;
  --down:          #ff4d6d;
  --muted:         #4a5568;
  --text:          #dde3f0;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 90%, rgba(245,200,66,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 60%, rgba(0,255,179,0.03) 0%, transparent 60%);
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle 1px at 12% 18%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(circle 1px at 35% 8%,  rgba(0,212,255,0.7)    0%, transparent 100%),
    radial-gradient(circle 1px at 62% 22%, rgba(255,255,255,0.4)  0%, transparent 100%),
    radial-gradient(circle 1px at 78% 55%, rgba(255,255,255,0.3)  0%, transparent 100%),
    radial-gradient(circle 1px at 90% 12%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(circle 1px at 5%  75%, rgba(0,212,255,0.5)    0%, transparent 100%),
    radial-gradient(circle 1px at 48% 88%, rgba(255,255,255,0.3)  0%, transparent 100%),
    radial-gradient(circle 1px at 22% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(circle 1px at 88% 78%, rgba(245,200,66,0.45)  0%, transparent 100%);
}

#app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.2rem 3rem;
}

.hdr {
  text-align: center;
  margin-bottom: 2rem;
}

.hdr-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.6rem, 7vw, 4.8rem);
  letter-spacing: 0.1em;
  line-height: 1;
  background: linear-gradient(160deg, #fff 0%, var(--cyan) 45%, #93e8ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 24px rgba(0,212,255,0.35));
}

.hdr-live {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 0.55rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  color: var(--muted);
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--up);
  box-shadow: 0 0 6px var(--up);
  animation: blink 1.2s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.1; }
}

#board {
  width: 100%;
  max-width: 760px;
  display: flex;
  flex-direction: column;
}

.col-header {
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  gap: 0.9rem;
  padding: 0 1.1rem 0 0.9rem;
  margin-bottom: 0.55rem;
}

.col-header span {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
}

.col-header .c3 {
  text-align: right;
}

.row {
  position: relative;
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  align-items: center;
  gap: 0.9rem;
  padding: 0.65rem 1.1rem 0.65rem 0.9rem;
  margin-bottom: 0.45rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  overflow: hidden;
  transition:
    transform 0.6s cubic-bezier(0.22,1,0.36,1),
    box-shadow 0.5s ease,
    border-color 0.5s ease,
    background 0.5s ease;
  will-change: transform;
  cursor: default;
}

.row.moving-front {
  z-index: 10;
}

.row:hover {
  transform: translateX(3px);
}

.row[data-rank="1"] {
  border-color: rgba(245,200,66,0.28);
  background: linear-gradient(100deg, rgba(245,200,66,0.07) 0%, transparent 55%), var(--surface);
  box-shadow: 0 0 24px rgba(245,200,66,0.09), inset 0 0 28px rgba(245,200,66,0.03);
}

.row[data-rank="2"] {
  border-color: rgba(168,180,200,0.22);
  background: linear-gradient(100deg, rgba(168,180,200,0.05) 0%, transparent 55%), var(--surface);
  box-shadow: 0 0 18px rgba(168,180,200,0.07);
}

.row[data-rank="3"] {
  border-color: rgba(200,125,62,0.22);
  background: linear-gradient(100deg, rgba(200,125,62,0.05) 0%, transparent 55%), var(--surface);
  box-shadow: 0 0 18px rgba(200,125,62,0.07);
}

.row.flash {
  animation: flashAnim 0.85s ease forwards;
}

@keyframes flashAnim {
  0%   { box-shadow: 0 0 0 1.5px var(--up), 0 0 28px rgba(0,255,179,0.25); border-color: rgba(0,255,179,0.7); }
  65%  { box-shadow: 0 0 0 1px rgba(0,255,179,0.2), 0 0 10px rgba(0,255,179,0.08); }
  100% {}
}

.row::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.025) 50%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.row:hover::after {
  opacity: 1;
}

.row.flash::before {
  content: '';
  position: absolute;
  top: 0;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,255,179,0.07), transparent);
  animation: sweep 0.6s ease forwards;
}

@keyframes sweep {
  from { left: -40%; }
  to   { left: 110%; }
}

.rank-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  width: 44px;
}

.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.75rem;

}

[data-rank="1"] .rank-num {
  color: var(--gold);
  text-shadow: 0 0 14px rgba(245,200,66,0.5);
}
[data-rank="2"] .rank-num {
  color: var(--silver);
  text-shadow: 0 0 10px rgba(168,180,200,0.4);
}
[data-rank="3"] .rank-num {
  color: var(--bronze);
  text-shadow: 0 0 10px rgba(200,125,62,0.4);
}
.row:not([data-rank="1"]):not([data-rank="2"]):not([data-rank="3"]) .rank-num {

}

.rank-delta {
  font-family: 'Space Mono', monospace;

  letter-spacing: 0.04em;
  line-height: 1;
  transition: color 0.3s;
}

.rank-delta.up { color: var(--up); }
.rank-delta.dn { color: var(--down); }
.rank-delta.eq { color: var(--muted); }

.mid {
  display: flex;
  flex-direction: column;

}

.name-row {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}

.t-name {
  font-weight: 600;

.bar-track {

  background: rgba(255,255,255,0.05);

}

.bar-fill {
  height: 100%;
  border-radius: 99px;

}

[data-rank="1"] .bar-fill {
  background: linear-gradient(90deg, #c87d00, var(--gold), #ffe97a);

}
[data-rank="2"] .bar-fill {
  background: linear-gradient(90deg, #607080, var(--silver));
}
[data-rank="3"] .bar-fill {
  background: linear-gradient(90deg, #7a4020, var(--bronze));
}
.row:not([data-rank="1"]):not([data-rank="2"]):not([data-rank="3"]) .bar-fill {
  background: linear-gradient(90deg, rgba(0,180,220,0.4), rgba(0,212,255,0.7));
}

.tags {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 0.1rem;
  flex-wrap: wrap;
}

.tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.07em;
  color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);

.tag b {

[data-rank="1"] .score-val {

}
[data-rank="2"] .score-val {
  color: var(--silver);
  filter: drop-shadow(0 0 5px rgba(168,180,200,0.35));
}
[data-rank="3"] .score-val {

.row:not([data-rank="1"]):not([data-rank="2"]):not([data-rank="3"]) .score-val {

.score-lbl {

.stats {

.stat {

/* ── FUNDING OVERLAY ── */
#funding-overlay {

@keyframes overlayIn {

.ov-label {

.ov-team {

</style>

<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-title">LEADERBOARD</div>
    <div class="hdr-live"><span class="dot"></span>LIVE</div>
  </header>

  <div id="board">
    <div class="col-header" style="order: -1;">
      <span>RANK</span>
      <span class="c2">TEAM</span>
      <span class="c3">POINTS</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat">TEAMS <em id="s-teams">—</em></div>
    <div class="stat">TOP <em id="s-top">—</em></div>
    <div class="stat">TOTAL <em id="s-total">—</em></div>
    <div class="stat">TICK <em id="s-tick">0</em></div>
  </div>
</div>

<!-- FUNDING OVERLAY -->
<div id="funding-overlay" role="dialog" aria-modal="true">
  <div class="ov-label">TOTAL POINTS</div>
  <div class="ov-team" id="ov-team-name"></div>
  <div class="ov-amount" id="ov-amount">0</div>
  <div class="ov-close-hint">CLICK ANYWHERE TO CLOSE</div>
</div>

<script>
let prevRank  = {};
let dispScore = {};
let rafs      = {};
let ticks     = 0;
let busy      = false;

async function apiFetch() {
  const url = `${API_URL}?action=init&_ts=${Date.now()}`;

  const res = await fetch(url, {
    method: 'GET',
    cache: 'no-store'
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);

  const json = await res.json();
  console.log('API 응답:', json);

  if (json.error) throw new Error(json.error);

  const ranking = Array.isArray(json.ranking) ? json.ranking : [];

  const list = ranking
    .map(r => {
      const name = String(r["팀명"] ?? "")
        .replace(/\s+/g, ' ')
        .trim();
      if (!name) return null;

      return {
        id: name,
        팀명: name,
        pts: Number(r["모인포인트"] ?? 0) || 0,
        investors: Number(r["투자자수"] ?? 0) || 0
      };
    })
    .filter(Boolean)
    .reduce((acc, cur) => {
      const exists = acc.find(t => t.id === cur.id);
      if (exists) {
        exists.pts       += cur.pts;
        exists.investors += cur.investors;
      } else {
        acc.push(cur);
      }
      return acc;
    }, [])
    .sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      return a.팀명.localeCompare(b.팀명, 'ko');
    })
    .reduce((acc, row, i) => {
      let 순위;
      if (i === 0) {
        순위 = 1;
      } else if (row.pts === acc[i - 1].pts) {
        순위 = acc[i - 1].순위;
      } else {
        순위 = i + 1;
      }
      acc.push({ ...row, 순위 });
      return acc;
    }, []);

  return list;
}

function setDot(state) {
  const d = document.querySelector('.dot');
  if (!d) return;
  const map = { ok:'var(--up)', err:'var(--down)', busy:'#778' };
  d.style.background = map[state] || map.ok;
  d.style.boxShadow  = `0 0 6px ${map[state] || map.ok}`;
}

function countUp(id, from, to, el) {
  if (rafs[id]) cancelAnimationFrame(rafs[id]);

  if (from === to) {
    el.textContent = to;
    dispScore[id] = to;
    return;
  }

  const t0 = performance.now();
  const dur = 600;

  (function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (to - from) * e);

    if (p < 1) {
      rafs[id] = requestAnimationFrame(step);
    } else {
      el.textContent = to;
      dispScore[id] = to;
    }
  })(t0);
}

function snap() {
  const m = {};
  document.querySelectorAll('#board .row[data-id]').forEach(el => {
    m[el.dataset.id] = el.getBoundingClientRect().top;
  });
  return m;
}

function render(list) {
  const board = document.getElementById('board');
  const max = Math.max(...list.map(t => t.pts), 1);

  const first = snap();

  // 순위가 올라가는 팀만 이동 애니메이션 중 앞쪽 레이어로 보이게 한다.
  const movingUpIds = new Set(
    list
      .filter(team => prevRank[team.id] != null && team.순위 < prevRank[team.id])
      .map(team => team.id)
  );

  const existing = {};
  board.querySelectorAll('.row[data-id]').forEach(el => {
    existing[el.dataset.id] = el;
  });

  Object.keys(existing).forEach(id => {
    if (!list.find(t => t.id === id)) existing[id].remove();
  });

  list.forEach((team) => {
    const rank = team.순위;
    const id = team.id;
    const pct = Math.max(2, (team.pts / max) * 100);
    let row = existing[id];

    if (!row) {
      row = document.createElement('div');
      row.className = 'row';
      row.dataset.id = id;
      row.innerHTML = rowHTML(team, rank, pct);
      row.addEventListener('click', () => openFunding(id, row.querySelector('.t-name').textContent));
      dispScore[id] = 0;
      existing[id] = row;
      const newScoreEl = row.querySelector('.score-val');
      newScoreEl.textContent = '0';
      if (team.pts > 0) countUp(id, 0, team.pts, newScoreEl);
      else dispScore[id] = 0;
    } else {
      const scoreEl = row.querySelector('.score-val');
      const from = dispScore[id] ?? team.pts;
      if (from !== team.pts) countUp(id, from, team.pts, scoreEl);
      else dispScore[id] = team.pts;
      row.querySelector('.bar-fill').style.width = pct + '%';
      row.querySelector('.t-investors').textContent = team.investors;
    }

    row.dataset.rank = team.pts === 0 ? 'none' : String(rank);
    row.querySelector('.rank-num').textContent = team.pts === 0 ? '-' : rank;

    const prev = prevRank[id];
    const deltaEl = row.querySelector('.rank-delta');
    if (deltaEl) {
      if (prev == null || prev === rank) {
        deltaEl.className = 'rank-delta eq';
        deltaEl.textContent = '—';
      } else if (rank < prev) {
        deltaEl.className = 'rank-delta up';
        deltaEl.textContent = '▲' + (prev - rank);
        row.classList.remove('flash');
        void row.offsetWidth;
        row.classList.add('flash');
        setTimeout(() => row.classList.remove('flash'), 900);
      } else {
        deltaEl.className = 'rank-delta dn';
        deltaEl.textContent = '▼' + (rank - prev);
      }
    }
  });

  list.forEach((team) => {
    board.appendChild(existing[team.id]);
  });

  const last = snap();
  Object.keys(last).forEach(id => {
    const el = existing[id];
    if (!el) return;
    const dy = (first[id] ?? last[id]) - last[id];
    if (Math.abs(dy) < 0.5) return;

    // FLIP 애니메이션 안정화:
    // 새 순서로 이동한 row를 먼저 예전 위치처럼 되돌려 놓고,
    // 브라우저가 그 상태를 계산한 다음 transform을 풀어야 모션이 보인다.
    const shouldMoveFront = movingUpIds.has(id);
    if (shouldMoveFront) el.classList.add('moving-front');

    el.style.transition = 'none';
    el.style.transform = `translateY(${dy}px)`;

    // 강제 리플로우: 이 줄이 없으면 일부 브라우저에서 중간 상태를 그리지 않고
    // 최종 위치로 바로 붙어버릴 수 있다.
    el.getBoundingClientRect();

    requestAnimationFrame(() => {
      el.style.transition = 'transform 0.6s cubic-bezier(0.22,1,0.36,1)';
      el.style.transform = 'translateY(0)';
    });

    const cleanup = (e) => {
      if (e && e.propertyName !== 'transform') return;
      if (shouldMoveFront) el.classList.remove('moving-front');
      el.style.transition = '';
      el.style.transform = '';
      el.removeEventListener('transitionend', cleanup);
    };

    el.addEventListener('transitionend', cleanup);
    setTimeout(() => cleanup(), 750);
  });

  list.forEach((t) => {
    prevRank[t.id] = t.순위;
  });
}

function rowHTML(t, rank, pct) {
  const esc = s => String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  return `
  <div class="rank-cell">
    <span class="rank-num">${rank}</span>
    <span class="rank-delta eq">—</span>
  </div>
  <div class="mid">
    <div class="name-row">
      <span class="t-name">${esc(t["팀명"])}</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="tags">
      <span class="tag">INVESTORS <b class="t-investors">${t.investors}</b></span>
    </div>
  </div>
  <div class="score-cell">
    <div class="score-val">${t.pts}</div>
    <div class="score-lbl">points</div>
  </div>`;
}

function updateStats(list) {
  const tot = list.reduce((s, t) => s + t.pts, 0);
  document.getElementById('s-teams').textContent = list.length;
  document.getElementById('s-top').textContent = list[0]?.pts ?? '—';
  document.getElementById('s-total').textContent = tot;
  document.getElementById('s-tick').textContent = ++ticks;
}

async function tick() {
  if (busy) return;
  busy = true;
  setDot('busy');

  try {
    const list = await apiFetch();

    if (list.length === 0) {
      document.querySelectorAll('#board .row[data-id]').forEach(r => r.remove());
      ['s-teams','s-top','s-total'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('s-tick').textContent = ++ticks;
    } else {
      render(list);
      updateStats(list);
      syncOverlay(list);
    }

    setDot('ok');
  } catch (e) {
    console.error('[leaderboard]', e);
    setDot('err');
  } finally {
    busy = false;
  }
}

/* ── FUNDING OVERLAY LOGIC ── */
let ovRaf = null;
let activeOverlayId = null;

function openFunding(id, teamName) {
  const overlay = document.getElementById('funding-overlay');
  document.getElementById('ov-team-name').textContent = teamName;
  activeOverlayId = id;

  const amountEl = document.getElementById('ov-amount');
  const target = dispScore[id] ?? 0;

  animateOverlayAmount(amountEl, 0, target);
  overlay.classList.add('visible');
}

function animateOverlayAmount(el, from, to) {
  if (ovRaf) cancelAnimationFrame(ovRaf);
  if (from === to) { el.textContent = to.toLocaleString(); return; }

  const t0 = performance.now();
  const dur = 700;

  (function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (to - from) * e).toLocaleString();
    if (p < 1) {
      ovRaf = requestAnimationFrame(step);
    } else {
      el.textContent = to.toLocaleString();
    }
  })(t0);
}

function syncOverlay(list) {
  if (!activeOverlayId) return;
  const overlay = document.getElementById('funding-overlay');
  if (!overlay.classList.contains('visible')) return;

  const team = list.find(t => t.id === activeOverlayId);
  if (!team) return;

  const amountEl = document.getElementById('ov-amount');
  const current = parseInt(amountEl.textContent.replace(/,/g, ''), 10) || 0;
  const next = team.pts;
  if (current !== next) animateOverlayAmount(amountEl, current, next);
}

function closeFunding() {
  const overlay = document.getElementById('funding-overlay');
  overlay.classList.remove('visible');
  activeOverlayId = null;
  if (ovRaf) { cancelAnimationFrame(ovRaf); ovRaf = null; }
}

document.getElementById('funding-overlay').addEventListener('click', closeFunding);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFunding(); });

tick();
setInterval(tick, POLL_MS);
</script>
